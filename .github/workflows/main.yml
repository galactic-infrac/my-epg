name: Update EPG
on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Fetch EPG Data
        run: |
          # We download directly here to avoid permission issues with .sh files
          curl -L "https://raw.githubusercontent.com/sh0m0/jp-epg/master/e.xml" -o guide.xml
          
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add guide.xml
          # This line prevents the "Exit 1" error if nothing has changed
          git commit -m "Update EPG Data" || echo "No changes to commit"
          git push || echo "Nothing to push"
