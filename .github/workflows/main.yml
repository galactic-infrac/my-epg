name: Update EPG
on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download EPG Data
        run: |
          # This is a high-availability CDN mirror
          curl -L "https://cdn.jsDelivr.net/gh/fusu-fusu/epg-japan@main/xmltv.xml" -o guide.xml

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add guide.xml
          # Only commit if the file actually changed or is new
          git commit -m "Update EPG Data" || echo "No changes to commit"
          git push
