name: Update EPG
on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions: # Explicitly setting permissions here as well
      contents: write
    steps:
      - uses: actions/checkout@v4 # Updated to v4
      - name: Fetch EPG
        run: |
          # Use -f to force overwrite and avoid errors
          curl -L "https://raw.githubusercontent.com/sh0m0/jp-epg/master/e.xml" -o guide.xml
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add guide.xml
          # Only commit if the file actually changed
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update EPG Data" && git push)
